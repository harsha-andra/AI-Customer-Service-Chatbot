<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Customer Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2230;
      --border: #2a2f3e;
      --accent: #5b8dee;
      --accent2: #7c3aed;
      --text: #e8eaf0;
      --muted: #6b7280;
      --bot-bubble: #1e2230;
      --user-bubble: linear-gradient(135deg, #5b8dee, #7c3aed);
      --radius: 18px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(91,141,238,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50%;
      height: 50%;
      background: radial-gradient(ellipse, rgba(124,58,237,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .chat-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      height: 100dvh;
      max-height: 860px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(91,141,238,0.08);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(30,34,48,0.6);
      backdrop-filter: blur(12px);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--user-bubble);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(91,141,238,0.3);
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }
      50%       { box-shadow: 0 0 0 5px rgba(34,197,94,0.08); }
    }

    .provider-badge {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      background: rgba(91,141,238,0.1);
      border: 1px solid rgba(91,141,238,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .message.bot .msg-avatar  { background: var(--surface2); }
    .message.user .msg-avatar { background: var(--user-bubble); }

    .bubble {
      max-width: 72%;
      padding: 13px 16px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.55;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-bottom-right-radius: 5px;
      color: #fff;
    }

    .bubble time {
      display: block;
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 5px;
    }

    .message.user .bubble time { color: rgba(255,255,255,0.55); text-align: right; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      padding: 14px 18px;
      border-radius: var(--radius);
      border-bottom-left-radius: 5px;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: dot 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot {
      0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
      40%           { transform: scale(1.2); opacity: 1; }
    }

    /* Quick replies */
    .quick-replies-wrap {
      padding: 0 20px 12px;
      border-top: 1px solid var(--border);
      background: rgba(18,21,29,0.6);
    }
    .qr-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 10px 0 8px;
    }
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-height: 42px;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .quick-replies.expanded { max-height: 220px; }
    .quick-reply-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .quick-reply-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(91,141,238,0.07);
    }
    .qr-toggle {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 0 0;
      display: block;
      transition: color 0.15s;
    }
    .qr-toggle:hover { color: var(--accent); }

    /* Input area */
    .input-area {
      padding: 16px 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(22,25,32,0.8);
      backdrop-filter: blur(8px);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 6px 6px 18px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
    }

    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      border: none;
      background: var(--user-bubble);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, opacity 0.15s;
    }

    #send-btn:hover  { transform: scale(1.05); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

    #send-btn svg { width: 18px; height: 18px; }

    .footer-hint {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* Provider selector (for demo) */
    .provider-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #provider-select {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: transparent;
      border: none;
      color: var(--accent);
      cursor: pointer;
      outline: none;
    }

    #provider-select option { background: #1e2230; color: var(--text); }

    /* Responsive */
    @media (max-width: 640px) {
      .chat-wrapper { border-radius: 0; max-height: 100dvh; }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <!-- Header -->
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h1 id="bot-name">Aria — AI Assistant</h1>
      <div class="status">
        <div class="status-dot"></div>
        <span>Online · Ready to help</span>
      </div>
    </div>
    <div class="provider-badge provider-select-wrap">
      <select id="provider-select" title="Switch provider">
        <option value="ollama">ollama</option>
        <option value="openai">openai</option>
        <option value="anthropic">anthropic</option>
        <option value="ibm_watson">ibm watson</option>
        <option value="dialogflow">dialogflow</option>
        <option value="aws_lex">aws lex</option>
      </select>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Quick replies -->
  <div class="quick-replies-wrap" id="quick-replies-wrap">
    <div class="qr-section-label">Common queries</div>
    <div class="quick-replies" id="quick-replies">
      <button class="quick-reply-btn" onclick="quickReply('Book an appointment')">📅 Book appointment</button>
      <button class="quick-reply-btn" onclick="quickReply('What are your opening hours?')">🕐 Opening hours</button>
      <button class="quick-reply-btn" onclick="quickReply('Track my order')">📦 Track order</button>
      <button class="quick-reply-btn" onclick="quickReply('I have a billing question')">💳 Billing</button>
      <button class="quick-reply-btn" onclick="quickReply('I need technical support')">🔧 Tech support</button>
      <button class="quick-reply-btn" onclick="quickReply('I want a refund or return')">🔄 Return / Refund</button>
      <button class="quick-reply-btn" onclick="quickReply('Request a callback from your team')">📞 Request callback</button>
      <button class="quick-reply-btn" onclick="quickReply('What services do you offer?')">🏷️ Services</button>
      <button class="quick-reply-btn" onclick="quickReply('I have a complaint')">⚠️ Complaint</button>
      <button class="quick-reply-btn" onclick="quickReply('Where is my nearest location?')">📍 Find location</button>
      <button class="quick-reply-btn" onclick="quickReply('Cancel my subscription')">❌ Cancel subscription</button>
      <button class="quick-reply-btn" onclick="quickReply('Speak to a human agent')">👤 Human agent</button>
    </div>
    <button class="qr-toggle" id="qr-toggle" onclick="toggleChips()">Show more ▼</button>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="user-input" placeholder="Type your message…" rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="footer-hint">AI can make mistakes · Verify important information</div>
  </div>
</div>

<script>
  const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  let isTyping = false;
  const businessName = document.title;

  // Welcome message
  window.addEventListener('DOMContentLoaded', () => {
    addMessage('bot', "Hi! I'm Aria, your virtual assistant. How can I help you today? 👋");
  });

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Enter to send (Shift+Enter for newline)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const ava = document.createElement('div');
    ava.className = 'msg-avatar';
    ava.textContent = role === 'bot' ? '🤖' : '🧑';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    const p = document.createElement('p');
    p.textContent = text;

    const t = document.createElement('time');
    const now = new Date();
    t.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    bub.appendChild(p);
    bub.appendChild(t);
    wrap.appendChild(ava);
    wrap.appendChild(bub);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message bot typing-indicator';
    wrap.id = 'typing';

    const ava = document.createElement('div');
    ava.className = 'msg-avatar';
    ava.textContent = '🤖';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(ava);
    wrap.appendChild(dots);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  let chipsExpanded = false;
  function toggleChips() {
    chipsExpanded = !chipsExpanded;
    document.getElementById('quick-replies').classList.toggle('expanded', chipsExpanded);
    document.getElementById('qr-toggle').textContent = chipsExpanded ? 'Show fewer ▲' : 'Show more ▼';
  }
  function quickReply(text) {
    inputEl.value = text;
    document.getElementById('quick-replies-wrap').style.display = 'none';
    sendMessage();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    isTyping = true;

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      hideTyping();

      if (data.reply) {
        addMessage('bot', data.reply);
      } else {
        addMessage('bot', '⚠️ ' + (data.error || 'Something went wrong. Please try again.'));
      }
    } catch (err) {
      hideTyping();
      // Fallback demo mode (no backend)
      const demos = {
        default: "Thanks for reaching out! I'm currently in demo mode. To connect a live AI provider, run the Flask backend and configure your `settings.yaml`.",
        book: "I'd love to help you book an appointment! Please share your preferred date, time, and any other details.",
        hours: "Our business hours are Monday–Friday 9am–6pm, and Saturday 10am–4pm.",
        order: "I'm sorry to hear about your order issue. Could you share your order number so I can look into it?",
        agent: "Connecting you to a human agent... In the meantime, please describe your issue and we'll get back to you shortly.",
      };
      const lower = text.toLowerCase();
      let reply = demos.default;
      if (lower.includes('book') || lower.includes('appoint')) reply = demos.book;
      else if (lower.includes('hour') || lower.includes('open')) reply = demos.hours;
      else if (lower.includes('order')) reply = demos.order;
      else if (lower.includes('human') || lower.includes('agent')) reply = demos.agent;
      addMessage('bot', reply);
    }

    isTyping = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>

</body>
</html>
