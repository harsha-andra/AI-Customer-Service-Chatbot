version: "3.9"

services:

  chatbot:
    build: .
    container_name: ai-customer-chatbot
    ports:
      - "5000:5000"
    volumes:
      - ./config/settings.yaml:/app/config/settings.yaml   # mount your config
      - ./logs:/app/logs                                     # persist chat logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - chatbot-net

  # ── Optional: run Ollama locally alongside the chatbot ──
  # Uncomment this block if you want to use the 'ollama' provider
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - chatbot-net

networks:
  chatbot-net:
    driver: bridge

